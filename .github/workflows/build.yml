name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 调试：列出工作目录文件树，确认 app 模块是否存在
      - name: Show project structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== app directory ==="
          ls -la app/ || echo "app/ directory not found!"
          echo "=== settings.gradle ==="
          cat settings.gradle || echo "settings.gradle not found!"
          echo "=== app/build.gradle ==="
          cat app/build.gradle || echo "app/build.gradle not found!"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: List all tasks (debug)
        run: |
          chmod +x gradlew
          ./gradlew tasks --no-daemon

      - name: Build APK
        run: |
          if [ -f gradle.properties ]; then
            sed -i 's/^org.gradle.java.home=/# &/' gradle.properties || true
          fi
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
